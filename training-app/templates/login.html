<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – {{ company }}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
body{background:linear-gradient(135deg,#1a2035 0%,#1a6fc4 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{width:100%;max-width:400px;border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card .card-body{padding:2.5rem}
.brand-icon{font-size:3rem;color:#1a6fc4}
</style>
</head>
<body>
<div class="card login-card">
  <div class="card-body text-center">
    <i class="bi bi-mortarboard-fill brand-icon"></i>
    <h4 class="fw-bold mt-2 mb-0">TrainTrack</h4>
    <p class="text-muted mb-4">{{ company }}</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in msgs %}<div class="alert alert-{{ cat }} py-2">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST" action="/login">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" required autofocus placeholder="you@company.com">
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
    </form>
    <p class="text-muted mt-3 mb-0" style="font-size:.8rem">Contact your administrator to reset your password.</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
